name: validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate PR-A examples
        run: python3 tools/validate_examples.py
