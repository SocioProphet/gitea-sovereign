name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - 'work/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate scaffold
        run: make validate
